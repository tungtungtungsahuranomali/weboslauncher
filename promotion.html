<style>

   }

    display:flex;
    height: 100vh;
    width: 100vw;
    overflow:hidden;

  /* --- LEFT PANEL: Kategori --- */

    min-width: 250px;

  .cat-header {
    padding: 16px 16px 12px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.05em;

  }

  .cat-item {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 10px;

  .cat-item.active {

  }
  .cat-item.focused {

  }

  .cat-thumb {
    width: 100%;
    height: 140px;
    border-radius: 8px;
    object-fit: fill;

    width: 100%;
    height: 140px;
    border-radius: 8px;
    flex-shrink: 0;
    background: rgba(255, 255, 255, 0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .cat-name {
    font-size: 15px;
    color: #cbd5e1;
    line-height: 1.4;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    text-align: center;
  }
  .cat-item.active .cat-name,
  .cat-item.focused .cat-name { color: #facc15; font-weight: 600; }

  .cat-count {
    position: absolute;
    right: 24px;
    bottom: 40px; /* Pindah ke bawah */
    font-size: 11px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    color: #fff;
    padding: 3px 8px;
    border-radius: 12px;
    font-weight: 600;
  }

  /* --- RIGHT PANEL: Slideshow --- */
  .slide-panel {
    flex: 1;
    min-width: 0;
    position: relative;
    overflow: hidden;
    background: #000;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #slideshow {
    position: relative;
    flex: 1;
    width: 100%;
    height: 100%;

  .slide {

    width: 100%;

    object-fit: fill;

  .slide-caption {
    position: absolute;

  }

  /* --- Slide Indicators --- */

    position: absolute;

  }

    transition: all 0.3s ease;

    background: #facc15;

    border-radius: 4px;

  /* --- Slide Counter --- */
  .slide-counter {

    bottom: 12px; /* Pindah ke bawah */
    right: 20px;

    padding: 4px 12px;

  }

  /* Navigation hint */
  .nav-hint {

    bottom: 20px;
    right: 30px;

    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0,0,0,0.5);
    padding: 8px 16px;

    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;

    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
    min-width: 24px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  .nav-label { font-size: 11px; color: #64748b; margin-right: 10px; }

  /* No data */
  .no-data {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #64748b;
    font-size: 1.2rem;
  }
  .no-data span { font-size: 3rem; margin-bottom: 12px; }

  /* Focus area indicator */
  .focus-area-indicator {
    position: absolute;
    top: 16px;
    left: 20px;
    z-index: 25;
    font-size: 11px;

    padding: 3px 10px;
    border-radius: 12px;
  }
</style>
</head>
<body>

<div class="layout">
  <!-- LEFT: Kategori -->
  <div class="cat-panel" id="catPanel">
    <div class="cat-header" id="catTitle">Promotion Categories</div>
    <div id="catList"></div>
  </div>

  <!-- RIGHT: Slideshow -->
  <div class="slide-panel" id="slidePanel">
    <div class="focus-area-indicator" id="focusIndicator"></div>
    <div class="slide-counter" id="slideCounter"></div>
    <div id="slideshow"></div>
    <div class="slide-indicators" id="slideIndicators"></div>
    <div class="nav-hint">
      <span class="nav-key">▲▼</span><span class="nav-label" id="hintCat">Category</span>
      <span class="nav-key">◄►</span><span class="nav-label" id="hintSlide">Slide</span>
      <span class="nav-key">OK</span><span class="nav-label" id="hintPlay">Play/Pause</span>
    </div>
  </div>
</div>

<script>
const lang = localStorage.getItem('app_lang') || 'id';

// Translations
if(lang === 'id') {
    document.getElementById('catTitle').textContent = 'Kategori Promotion';
    document.getElementById('hintCat').textContent = 'Kategori';
}

let categories = [];
let allFacilities = [];
let currentCatIndex = 0;
let currentSlideIndex = 0;
let slides = [];
let autoTimer = null;
const AUTO_INTERVAL = 5000;
let isPaused = false;

async function init() {
  try {
    // Load categories
    const catRes = await fetch(`./api.php?action=getKatPromotion&_=${Date.now()}`);
    const catData = await catRes.json();
    if (catData.status === 'success') {
      categories = catData.data;
    }

    // Load all facilities
    const facRes = await fetch(`./api.php?action=getPromotion&lang=${lang}&_=${Date.now()}`);
    const facData = await facRes.json();
    if (facData.status === 'success') {
      allFacilities = facData.data;
    }

    if (categories.length === 0 && allFacilities.length === 0) {
      document.getElementById('slidePanel').innerHTML = '<div class="no-data"><span>📭</span>No Promotion Data</div>';
      return;
    }

    // Handle items without category or empty categories
    const hasUncategorized = allFacilities.some(f => !f.id_kat_promotion || f.id_kat_promotion == 0);
    if (categories.length === 0 || hasUncategorized) {
      categories.unshift({
        id_kat_promotion: 'all',
        nm_kat_promotion: (lang === 'en') ? 'All Promotions' : 'Semua Promosi',
        foto_kat_promotion: ''
      });
    }

    buildCategoryList();
    selectCategory(0);

  } catch(e) {
    console.error(e);
    document.getElementById('slidePanel').innerHTML = '<div class="no-data"><span>⚠️</span>Failed to Load Data</div>';
  }
}

function buildCategoryList() {
  const container = document.getElementById('catList');
  container.innerHTML = '';
  categories.forEach((cat, i) => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (i === 0 ? ' active focused' : '');
    el.dataset.index = i;

    const thumbHTML = cat.foto_kat_promotion
      ? `<img src="${cat.foto_kat_promotion}" class="cat-thumb" alt="">`
      : `<div class="cat-thumb-placeholder">🚀</div>`;

    // Count facilities for this category
    const count = (cat.id_kat_promotion === 'all')
      ? allFacilities.length
      : allFacilities.filter(f => f.id_kat_promotion == cat.id_kat_promotion).length;

    el.innerHTML = `${thumbHTML}<span class="cat-name">${cat.nm_kat_promotion}</span><span class="cat-count">${count}</span>`;
    el.addEventListener('click', () => selectCategory(i));
    container.appendChild(el);
  });
}

function selectCategory(index) {
  if (!categories[index]) return;

  currentCatIndex = index;
  currentSlideIndex = 0;

  // Update active class
  document.querySelectorAll('.cat-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });

  // Filter facilities by category
  const catId = categories[index].id_kat_promotion;
  if (catId === 'all') {
    slides = allFacilities;
  } else {
    slides = allFacilities.filter(f => f.id_kat_promotion == catId);
  }

  if (slides.length === 0) {
    document.getElementById('slideshow').innerHTML = '';
    document.getElementById('slideCounter').textContent = '';
    document.getElementById('slideIndicators').innerHTML = '';
    document.getElementById('slidePanel').querySelector('.no-data')?.remove();
    const noData = document.createElement('div');
    noData.className = 'no-data';
    noData.innerHTML = '<span>📭</span>No data in this category';
    noData.id = 'noDataMsg';
    document.getElementById('slidePanel').appendChild(noData);
    stopAuto();
    return;
  }

  // Remove no-data message if exists
  document.getElementById('noDataMsg')?.remove();

  buildSlides();
  startAuto();
}

function buildSlides() {
  const container = document.getElementById('slideshow');
  container.innerHTML = '';

  slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');

    let captionHTML = '';
    if (s.show_description == 1) {
      captionHTML = `<div class="slide-caption"><h2>${s.name}</h2><p>${s.description || ''}</p></div>`;
    }

    div.innerHTML = `<img src="${s.icon_path}" alt="">${captionHTML}`;
    container.appendChild(div);
  });

  updateCounter();
  buildDots();
}

function updateCounter() {
  const counter = document.getElementById('slideCounter');
  if (slides.length > 0) {
    counter.textContent = `${currentSlideIndex + 1} / ${slides.length}`;
  } else {
    counter.textContent = '';
  }
}

function buildDots() {
  const container = document.getElementById('slideIndicators');
  container.innerHTML = '';
  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'slide-dot' + (i === 0 ? ' active' : '');
    container.appendChild(dot);
  });
}

function goToSlide(index) {
  if (slides.length === 0) return;
  const allSlides = document.querySelectorAll('.slide');
  const allDots = document.querySelectorAll('.slide-dot');

  allSlides[currentSlideIndex]?.classList.remove('active');
  allDots[currentSlideIndex]?.classList.remove('active');

  currentSlideIndex = ((index % slides.length) + slides.length) % slides.length;

  allSlides[currentSlideIndex]?.classList.add('active');
  allDots[currentSlideIndex]?.classList.add('active');
  updateCounter();
}

function nextSlide() { goToSlide(currentSlideIndex + 1); }
function prevSlide() { goToSlide(currentSlideIndex - 1); }

function startAuto() {
  stopAuto();
  isPaused = false;
  updateFocusIndicator();
  if (slides.length > 1) {
    autoTimer = setInterval(nextSlide, AUTO_INTERVAL);
  }
}

function stopAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
}

function togglePause() {
  if (isPaused) {
    startAuto();
  } else {
    stopAuto();
    isPaused = true;
    updateFocusIndicator();
  }
}

function updateFocusIndicator() {
  const el = document.getElementById('focusIndicator');
  if (isPaused) {
    el.textContent = '⏸ Paused';
  } else {
    el.textContent = '▶ Auto-play';
  }
}

function updateCategoryFocus() {
  document.querySelectorAll('.cat-item').forEach((el, i) => {
    el.classList.toggle('focused', i === currentCatIndex);
  });
  // Scroll into view
  const focusedEl = document.querySelector('.cat-item.focused');
  if (focusedEl) {
    focusedEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// === KEYBOARD / REMOTE NAVIGATION ===
document.addEventListener('keydown', (e) => {
  const key = e.key || '';
  const keyCode = e.keyCode || e.which;

  // Back to launcher
  if (key === 'Backspace' || key === 'Escape' || key === 'Back' || keyCode === 4 || keyCode === 8 || keyCode === 27) {
    e.preventDefault();
    window.location.href = 'index.php';
    return;
  }

  if (categories.length === 0) {
    // No categories, just slideshow nav
    if (e.key === 'ArrowRight') { nextSlide(); stopAuto(); isPaused = true; updateFocusIndicator(); }
    if (e.key === 'ArrowLeft') { prevSlide(); stopAuto(); isPaused = true; updateFocusIndicator(); }
    if (e.key === 'Enter') { togglePause(); }
    return;
  }

  switch(e.key) {
    case 'ArrowUp':
      e.preventDefault();
      if (currentCatIndex > 0) {
        currentCatIndex--;
        updateCategoryFocus();
        selectCategory(currentCatIndex);
      }
      break;
    case 'ArrowDown':
      e.preventDefault();
      if (currentCatIndex < categories.length - 1) {
        currentCatIndex++;
        updateCategoryFocus();
        selectCategory(currentCatIndex);
      }
      break;
    case 'ArrowRight':
      e.preventDefault();
      nextSlide();
      stopAuto();
      isPaused = true;
      updateFocusIndicator();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      prevSlide();
      stopAuto();
      isPaused = true;
      updateFocusIndicator();
      break;
    case 'Enter':
      e.preventDefault();
      togglePause();
      break;
  }
});

init();
</script>
</body>
</html>
