<body>
<div class="layout">
  <div class="form-card">
    <div class="form-title">🚐 Transportation</div>

    <!-- Auto-filled (hidden) -->
    <div id="guest-info" class="form-group hidden">
      <div class="form-label">👤 Guest</div>
      <div class="form-value" id="guest-name-display">Loading...</div>
    </div>
    <div class="form-group hidden">
      <div class="form-label">🚪 Room</div>
      <div class="form-value" id="room-number-display">Loading...</div>
    </div>
    <div class="form-group hidden">
      <div class="form-label">📍 Pick-up</div>
      <div class="form-value" id="pickup-display">Loading...</div>
    </div>

    <div class="form-group hidden">
      <label class="form-label">🚏 Destination</label>
      <div class="form-value" id="destination-display">By Request</div>
    </div>

    <div class="form-group hidden">
      <label class="form-label">👥 Passengers</label>
      <div id="passenger-control" class="flex items-center gap-4 mt-1">
        <button id="pass-minus" class="w-10 h-10 rounded-full bg-white/10 text-white text-xl font-bold focus:bg-white/20">−</button>
        <span id="pass-count" class="text-2xl font-bold w-8 text-center">1</span>
        <button id="pass-plus" class="w-10 h-10 rounded-full bg-white/10 text-white text-xl font-bold focus:bg-white/20">+</button>
      </div>
    </div>

    <div class="form-group hidden">
      <label class="form-label">⏰ Time</label>
      <div class="time-options">
        <div id="time-now" class="time-option active" tabindex="0">🔴 Now</div>
        <div id="time-later" class="time-option" tabindex="0">⏱ Pick Time</div>
      </div>
      <div id="time-picker" class="hidden mt-2">
        <input type="time" id="time-input" value="12:00" class="form-input">
      </div>
    </div>

    <div class="form-group hidden">
      <label class="form-label">📝 Notes</label>
      <input type="text" id="notes-input" value="From Hotel Room" class="form-input">
    </div>

    <button id="submit-btn" class="btn-submit">📩 Send Request</button>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon">✅</div>
    <div class="modal-title" id="modal-title">Success</div>
    <div class="modal-desc" id="modal-desc">Request sent!</div>
    <button id="modal-btn" class="modal-btn">OK</button>
  </div>
</div>

<script>
const STORAGE_DEVICE_ID_KEY = 'myDeviceID_v8_final';
const STORAGE_GUEST_NAME_KEY = 'guest_name_v8_final';
const STORAGE_ROOM_NUM_KEY = 'room_number_v8_final';

let passengers = 1;
let selectedTime = 'NOW';
let isModalOpen = false;

// Guest info from localStorage
const guestName = localStorage.getItem(STORAGE_GUEST_NAME_KEY) || 'Guest';
const roomNumber = localStorage.getItem(STORAGE_ROOM_NUM_KEY) || localStorage.getItem(STORAGE_DEVICE_ID_KEY) || '-';
document.getElementById('guest-name-display').textContent = guestName;
document.getElementById('room-number-display').textContent = roomNumber;
document.getElementById('pickup-display').textContent = 'Kamar ' + roomNumber;
document.getElementById('destination-display').textContent = 'By Request';

// Passenger controls
document.getElementById('pass-minus').onclick = () => {
  if (passengers > 1) { passengers--; updatePassengers(); }
};
document.getElementById('pass-plus').onclick = () => {
  if (passengers < 8) { passengers++; updatePassengers(); }
};
function updatePassengers() {
  document.getElementById('pass-count').textContent = passengers;
}

// Time options
document.getElementById('time-now').onclick = () => {
  selectedTime = 'NOW';
  document.querySelectorAll('.time-option').forEach(el => el.classList.remove('active'));
  document.getElementById('time-now').classList.add('active');
  document.getElementById('time-picker').classList.add('hidden');
};
document.getElementById('time-later').onclick = () => {
  selectedTime = document.getElementById('time-input').value;
  document.querySelectorAll('.time-option').forEach(el => el.classList.remove('active'));
  document.getElementById('time-later').classList.add('active');
  document.getElementById('time-picker').classList.remove('hidden');
};
document.getElementById('time-input').onchange = () => {
  if (document.getElementById('time-later').classList.contains('active')) {
    selectedTime = document.getElementById('time-input').value;
  }
};

// Modal
function showModal(icon, title, desc) {
  isModalOpen = true;
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-desc').textContent = desc;
  document.getElementById('modal').classList.add('show');
  setTimeout(() => document.getElementById('modal-btn').focus(), 100);
}
function hideModal() {
  isModalOpen = false;
  document.getElementById('modal').classList.remove('show');
}
document.getElementById('modal-btn').onclick = hideModal;

// Submit
document.getElementById('submit-btn').onclick = async () => {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Sending...';
  try {
    const res = await fetch('./api.php?action=submitTransportRequest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        guest_name: guestName,
        room_number: roomNumber,
        pickup_point: 'Kamar ' + roomNumber,
        destination: 'By Request',
        num_passengers: passengers,
        preferred_time: selectedTime,
        notes: document.getElementById('notes-input').value || 'From Hotel Room'
      })
    });
    const d = await res.json();
    if (d.status === 'success') {
      showModal('✅', 'Success', 'Transportation request sent!');
    } else {
      showModal('❌', 'Gagal', d.message || 'An error occurred');
    }
  } catch (e) {
    showModal('❌', 'System Error', e.message);
  }
  btn.disabled = false;
  btn.textContent = '📩 Send Request';
};

// Keyboard nav (TV remote)
document.addEventListener('keydown', (e) => {
  if (isModalOpen) {
    if (e.key === 'Enter' || e.key === 'Escape') { e.preventDefault(); hideModal(); }
    return;
  }
  if (e.key === 'Backspace' || e.key === 'Escape') {
    e.preventDefault(); location.href = 'index.php';
  }
  // Arrow keys focus submit button, Enter to submit
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
    document.getElementById('submit-btn').focus();
  }
});
// Auto-focus submit on load
window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('submit-btn').focus(), 300);
});

// Fetch fresh guest info
(async () => {
  const devId = localStorage.getItem(STORAGE_DEVICE_ID_KEY);
  if (!devId) return;
  try {
    const res = await fetch(`./api.php?action=getGuestInfo&device_id=${devId}&_=${Date.now()}`);
    const d = await res.json();
    if (d.status === 'success') {
      document.getElementById('guest-name-display').textContent = d.data.guest_name;
      document.getElementById('room-number-display').textContent = d.data.room_number;
      document.getElementById('pickup-display').textContent = 'Kamar ' + d.data.room_number;
    }
  } catch(e) {}
})();
</script>
</body>
</html>
