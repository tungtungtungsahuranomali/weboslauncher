<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Amenities</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    font-family: 'Inter', sans-serif; 
    background: url('img/latar.jpg?v=<?php echo time(); ?>') no-repeat center center fixed;
    background-size: cover;
    color: white; 
    overflow: hidden; 
    height: 100vh; 
    width: 100vw; 
  }
  
  .layout { 
    display: flex; 
    height: 100vh; 
    width: 100vw; 
    background: rgba(0, 0, 0, 0.4);
  }

  /* --- LEFT PANEL: Menu Grid --- */
  .menu-panel {
    flex: 1;
    padding: 30px 40px;
    overflow-y: auto;
    scrollbar-width: none;
    background: #000; /* Latar belakang hitam pekat seperti Dining */
  }
  .menu-panel::-webkit-scrollbar { display:none; }

  .menu-title {
    font-size: 2.5rem;
    font-weight: 800;
    color: #facc15;
    margin-bottom: 30px;
    text-align: center;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* Tampilkan 3 kolom sesuai permintaan */
    gap: 20px;
  }

  .menu-card { 
    background: rgba(255, 255, 255, 0.08); 
    backdrop-filter: blur(8px);
    border-radius: 12px; 
    padding: 12px; 
    height: 260px; /* Sesuaikan tinggi untuk 3 kolom agar proporsional */
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: space-between;
    text-align: center; 
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    position: relative;
  }
  
  .menu-card.focused { 
    outline: none;
    border-color: #facc15;
    background: rgba(255, 255, 255, 0.15); 
    transform: translateY(-5px) scale(1.05); 
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    z-index: 10;
  }

  .menu-card-img-wrapper {
    width: 100%;
    height: 170px; /* Sesuaikan tinggi gambar untuk 3 kolom */
    border-radius: 8px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.05);
    margin-bottom: 10px;
  }

  .menu-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .menu-card-name {
    font-size: 1.3rem; /* Font sedikit lebih besar untuk 3 kolom */
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  
  .menu-card.focused .menu-card-name {
    color: #facc15;
  }

  .request-sidebar {
    width: 300px; /* Perkecil lebar sidebar dari 380px ke 300px */
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(15px);
    border-left: 1px solid rgba(255,255,255,0.1);
    display: flex; 
    flex-direction: column;
    height: 100vh;
    box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    z-index: 100;
  }
  
  .sidebar-header {
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    background: rgba(255, 255, 255, 0.05);
  }
  
  .sidebar-header h2 {
    font-size: 1.5rem;
    font-weight: 800;
    color: #facc15;
  }

  .cart-list {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    scrollbar-width: none;
  }
  .cart-list::-webkit-scrollbar { display:none; }

  .cart-item {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }
  .cart-item.focused {
    border-color: #facc15;
    background: rgba(255, 255, 255, 0.1);
  }

  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 700; font-size: 1.1rem; color: #fff; }

  .qty-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .qty-btn { 
    width: 34px; 
    height: 34px; 
    border-radius: 8px; 
    background: rgba(255, 255, 255, 0.1); 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    color: #fff;
    font-weight: 800;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qty-btn.focused { 
    background: #facc15; 
    color: #000; 
    border-color: #fff;
    transform: scale(1.1);
  }

  .sidebar-footer {
    padding: 24px;
    border-top: 1px solid rgba(255,255,255,0.1);
    background: rgba(255, 255, 255, 0.05);
  }

  .action-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    font-weight: 800;
    font-size: 1.1rem;
    text-align: center;
    border: 2px solid transparent;
    transition: all 0.2s;
    margin-bottom: 12px;
    cursor: pointer;
  }
  
  .btn-submit { background: #facc15; color: #000; }
  .btn-submit.focused { border-color: #fff; transform: scale(1.02); }
  
  .btn-back { background: rgba(255, 255, 255, 0.1); color: #fff; margin-bottom: 0; border: 1px solid rgba(255, 255, 255, 0.1); }
  .btn-back.focused { background: rgba(255, 255, 255, 0.2); border-color: #facc15; transform: scale(1.02); }

  .no-data {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: rgba(255, 255, 255, 0.2); font-size: 1.2rem;
  }

  /* Navigation hint */
  .nav-hint {
    position: fixed;
    bottom: 20px;
    left: 30px;
    z-index: 60;
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0,0,0,0.5);
    padding: 8px 16px;
    border-radius: 30px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .nav-key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
    min-width: 24px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  .nav-label { font-size: 12px; color: #aaa; font-weight: 600; margin-right: 5px; }

  /* Custom Modal */
  .custom-modal {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
    display: none; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .custom-modal.show { display: flex; opacity: 1; }
  .modal-content {
    background: #1e293b; border-radius: 16px; padding: 30px 40px;
    max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
    transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .custom-modal.show .modal-content { transform: scale(1); }
  .modal-icon { font-size: 48px; margin-bottom: 16px; }
  .modal-title { font-size: 24px; color: #fff; font-weight: 700; margin-bottom: 12px; }
  .modal-message { font-size: 16px; color: #cbd5e1; margin-bottom: 24px; }
  .modal-btn {
    background: #facc15; color: #000; padding: 10px 24px;
    border-radius: 8px; font-weight: 700; cursor: pointer;
    display: inline-block; transition: all 0.2s;
  }
  .modal-btn.focused { transform: scale(1.05); box-shadow: 0 0 15px rgba(250, 204, 21, 0.4); }

</style>
</head>
<body>

<div id="msgModal" class="custom-modal">
  <div class="modal-content">
    <div id="modalIcon" class="modal-icon">✅</div>
    <div id="modalTitle" class="modal-title">Success</div>
    <div id="modalText" class="modal-message">Your request has been sent.</div>
    <div id="modalBtn" class="modal-btn focused">OK</div>
  </div>
</div>

<div class="layout">
  <!-- LEFT: Amenities Grid -->
  <div class="menu-panel" id="menu-wrapper">
    <h1 class="menu-title" data-translate="amenities_title">Amenities</h1>
    <div id="menu-list" class="menu-grid"></div>
  </div>

  <!-- RIGHT: Request Sidebar -->
  <div class="request-sidebar" id="request-wrapper">
    <div class="sidebar-header">
      <h2 data-translate="request_list">Daftar Permintaan</h2>
    </div>
    <div id="cart-list" class="cart-list"></div>
    <div class="sidebar-footer">
      <div id="submit-btn" class="action-btn btn-submit" data-translate="send_btn">Kirim Permintaan</div>
    </div>
  </div>

  <div class="nav-hint">
    <span class="nav-key">▲▼◄►</span><span class="nav-label">Navigasi</span>
    <span class="nav-key">OK</span><span class="nav-label">Pilih</span>
    <span class="nav-key">BACK</span><span class="nav-label">Kembali</span>
  </div>
</div>

<script>
let cart={};
const lang = localStorage.getItem('app_lang') || 'id';

// Remote vs Mouse Control
let isMouseActive = false;
let lastMouseMove = 0;
document.addEventListener('mousemove', () => { 
    const now = Date.now();
    if (now - lastMouseMove > 100) { // Hanya aktif jika ada pergerakan nyata (bukan jitter)
        isMouseActive = true; 
    }
    lastMouseMove = now;
});
document.addEventListener('keydown', () => { 
    isMouseActive = false; 
});

const dict = {
  'id': { 'amenities_title': 'Permintaan Amenities', 'request_list': 'Daftar Permintaan', 'send_btn': 'Kirim Permintaan', 'close': 'Kembali', 'success': 'Permintaan Terkirim!', 'empty': 'Belum ada item dipilih' },
  'en': { 'amenities_title': 'Amenities Request', 'request_list': 'Request List', 'send_btn': 'Send Request', 'close': 'Back', 'success': 'Request Sent!', 'empty': 'No items selected' }
};

document.querySelectorAll('[data-translate]').forEach(el => {
  const k = el.dataset.translate;
  if(dict[lang] && dict[lang][k]) el.textContent = dict[lang][k];
});

let amenitiesData = [];
let currentFocus = 'grid'; // 'grid', 'sidebar'
let gridIndex = 0;
let sidebarIndex = -1; // -1 for submit, >=0 for items
let sidebarType = 'plus'; // 'minus', 'plus'

async function load() {
  try {
      const res = await fetch(`./api.php?action=getAmenities&lang=${lang}&_=${Date.now()}`);
      const d = await res.json();
      amenitiesData = d.data;

      const menuList = document.getElementById('menu-list');
      const requestWrapper = document.getElementById('request-wrapper');

      const requestCardEnabled = !!d.request_card_enabled;
      if (!requestCardEnabled) {
          requestWrapper.style.display = 'none';
          menuList.style.gridTemplateColumns = 'repeat(4, 1fr)'; // Sesuaikan jadi 4 kolom jika sidebar mati
      } else {
          requestWrapper.style.display = 'flex';
          menuList.style.gridTemplateColumns = 'repeat(3, 1fr)'; // Sesuaikan jadi 3 kolom jika sidebar aktif
      }

      menuList.innerHTML = '';
      amenitiesData.forEach((i, idx) => {
        const el = document.createElement('div');
        el.className='menu-card';
        el.id = `menu-card-${idx}`;
        el.innerHTML=`
            <div class="menu-card-img-wrapper">
              <img src="${i.icon_path}" alt="">
            </div>
            <div class="menu-card-name">${i.name}</div>
        `;
        el.onmouseenter = () => {
            if (!isMouseActive) return;
            currentFocus = 'grid';
            gridIndex = idx;
            updateFocus();
        };
        el.onclick = (e) => {
            e.preventDefault();
            add(i);
        };

        menuList.appendChild(el);
      });
      
      updateFocus();
  } catch(e){
    console.error(e);
  }
}

function add(i){
  if(!cart[i.id]) cart[i.id] = {...i, qty:0};
  cart[i.id].qty++;
  render();

  // Pindahkan fokus ke item di sidebar
  const keys = Object.keys(cart);
  const itemIndexInSidebar = keys.indexOf(String(i.id));
  if (itemIndexInSidebar !== -1) {
    currentFocus = 'sidebar';
    sidebarIndex = itemIndexInSidebar;
    sidebarType = 'plus';
    updateFocus();
  }
}

function updateQty(id, delta) {
  if(cart[id]) {
    cart[id].qty += delta;
    if(cart[id].qty <= 0) {
      delete cart[id];
      const keys = Object.keys(cart);
      if (keys.length === 0) {
        currentFocus = 'grid';
      } else if (sidebarIndex >= keys.length) {
        sidebarIndex = keys.length - 1;
      }
    }
    render();
    updateFocus();
  }
}

function render() {
  const c = document.getElementById('cart-list');
  c.innerHTML = '';
  const keys = Object.keys(cart);

  if (keys.length === 0) {
    c.innerHTML = '<div class="no-data">Belum ada permintaan</div>';
    return;
  }

  keys.forEach((k, idx) => {
    const i = cart[k];
    const div = document.createElement('div');
    div.className = "cart-item";
    div.id = `cart-item-${idx}`;
    div.innerHTML = `
      <div class="cart-item-info">
        <div class="cart-item-name">${i.name}</div>
      </div>
      <div class="qty-controls">
        <div class="qty-btn" id="qty-minus-${idx}">-</div>
        <div class="font-bold w-6 text-center text-yellow-400">${i.qty}</div>
        <div class="qty-btn" id="qty-plus-${idx}">+</div>
      </div>
    `;
    c.appendChild(div);

    setTimeout(() => {
        const btnMinus = document.getElementById(`qty-minus-${idx}`);
        const btnPlus = document.getElementById(`qty-plus-${idx}`);
        if (btnMinus) {
            btnMinus.onmouseenter = () => { if (!isMouseActive) return; currentFocus = 'sidebar'; sidebarIndex = idx; sidebarType = 'minus'; updateFocus(); };
            btnMinus.onclick = (e) => { e.preventDefault(); updateQty(k, -1); };
        }
        if (btnPlus) {
            btnPlus.onmouseenter = () => { if (!isMouseActive) return; currentFocus = 'sidebar'; sidebarIndex = idx; sidebarType = 'plus'; updateFocus(); };
            btnPlus.onclick = (e) => { e.preventDefault(); updateQty(k, 1); };
        }
        div.onmouseenter = () => { if (!isMouseActive) return; currentFocus = 'sidebar'; sidebarIndex = idx; updateFocus(); };
    }, 0);
  });
}

function updateFocus() {
  // Clear all possible focused classes from all elements
  document.querySelectorAll('.focused').forEach(el => el.classList.remove('focused'));

  if (currentFocus === 'grid') {
    const el = document.getElementById(`menu-card-${gridIndex}`);
    if (el) {
      el.classList.add('focused');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  } else if (currentFocus === 'sidebar') {
    const keys = Object.keys(cart);
    if (sidebarIndex === -1) {
      const btn = document.getElementById('submit-btn');
      if (btn) btn.classList.add('focused');
    } else if (sidebarIndex >= 0 && sidebarIndex < keys.length) {
      const itemEl = document.getElementById(`cart-item-${sidebarIndex}`);
      const btnEl = document.getElementById(`qty-${sidebarType}-${sidebarIndex}`);
      if (itemEl) itemEl.classList.add('focused');
      if (btnEl) btnEl.classList.add('focused');
    }
  } else if (currentFocus === 'modal') {
    const btn = document.getElementById('modalBtn');
    if (btn) btn.classList.add('focused');
  }
}

document.getElementById('submit-btn').onclick = (e) => { e.preventDefault(); submitRequest(); };
document.getElementById('submit-btn').onmouseenter = () => { 
    if (!isMouseActive) return;
    currentFocus = 'sidebar'; 
    sidebarIndex = -1; 
    updateFocus(); 
};

let isModalOpen = false;

function showModal(title, msg, isSuccess=true) {
    const m = document.getElementById('msgModal');
    if (!m) return;
    const mTitle = document.getElementById('modalTitle');
    const mText = document.getElementById('modalText');
    const mIcon = document.getElementById('modalIcon');
    const mBtn = document.getElementById('modalBtn');

    if (mTitle) mTitle.textContent = title;
    if (mText) mText.textContent = msg;
    if (mIcon) mIcon.textContent = isSuccess ? '✅' : '❌';

    m.classList.add('show');
    isModalOpen = true;
    currentFocus = 'modal';
    updateFocus();
}

function hideModal() {
    const m = document.getElementById('msgModal');
    if (m) m.classList.remove('show');
    isModalOpen = false;
    currentFocus = 'grid';
    updateFocus();
}

document.getElementById('modalBtn').onclick = () => hideModal();

async function submitRequest() {
  if(Object.keys(cart).length===0) return showModal("Error", dict[lang]['empty'], false);
  try {
    const res = await fetch('./api.php?action=submitAmenityRequest', {
      method:'POST', 
      body:JSON.stringify({
        guest_name:localStorage.getItem('guest_name_v8_final')||'Guest', 
        room_number:localStorage.getItem('room_number_v8_final')||'-', 
        items:Object.values(cart)
      })
    });
    const d = await res.json();
    if (d.status === 'success') {
      cart={}; 
      render();
      showModal(lang === 'id' ? 'Berhasil' : 'Success', dict[lang]['success'], true);
    } else {
      showModal("Error", (d.message || "Failed to submit request"), false);
    }
  } catch(e) {
    showModal("System Error", e.message, false);
  }
}

document.addEventListener('keydown', (e) => {
    if (isModalOpen) {
        if (e.key === 'Enter' || e.key === 'Escape') {
            e.preventDefault();
            hideModal();
        }
        return;
    }
    const key = e.key;
    
    if (key === 'Backspace' || key === 'Escape') {
        e.preventDefault();
        location.href = 'index.php';
        return;
    }

    if (currentFocus === 'grid') {
      const wrapper = document.getElementById('request-wrapper');
      const sidebarVisible = wrapper && wrapper.style.display !== 'none';
      const cols = sidebarVisible ? 3 : 4;

      if (key === 'ArrowRight') {
        e.preventDefault();
        if ((gridIndex + 1) % cols !== 0 && gridIndex < amenitiesData.length - 1) {
          gridIndex++;
        } else if (sidebarVisible) {
          if (Object.keys(cart).length > 0) {
            currentFocus = 'sidebar';
            sidebarIndex = 0;
            sidebarType = 'plus';
          } else {
            currentFocus = 'sidebar';
            sidebarIndex = -1; // Submit btn
          }
        }
      } else if (key === 'ArrowLeft') {
        e.preventDefault();
        if (gridIndex > 0) gridIndex--;
      } else if (key === 'ArrowDown') {
        e.preventDefault();
        if (gridIndex + cols < amenitiesData.length) gridIndex += cols;
        else if (sidebarVisible) {
          if (Object.keys(cart).length > 0) {
            currentFocus = 'sidebar';
            sidebarIndex = 0;
            sidebarType = 'plus';
          } else {
            currentFocus = 'sidebar';
            sidebarIndex = -1; // Submit btn
          }
        }
      } else if (key === 'ArrowUp') {
        e.preventDefault();
        if (gridIndex - cols >= 0) gridIndex -= cols;
      } else if (key === 'Enter') {
        e.preventDefault();
        if (amenitiesData[gridIndex]) add(amenitiesData[gridIndex]);
      }
    } else if (currentFocus === 'sidebar') {
      const keys = Object.keys(cart);
      if (key === 'ArrowLeft') {
        e.preventDefault();
        if (sidebarIndex >= 0 && sidebarType === 'plus') {
          sidebarType = 'minus';
        } else {
          currentFocus = 'grid';
        }
      } else if (key === 'ArrowRight') {
        e.preventDefault();
        if (sidebarIndex >= 0 && sidebarType === 'minus') {
          sidebarType = 'plus';
        }
      } else if (key === 'ArrowUp') {
        e.preventDefault();
        if (sidebarIndex === -1) {
          if (keys.length > 0) sidebarIndex = keys.length - 1;
          else currentFocus = 'grid';
        } else if (sidebarIndex > 0) {
          sidebarIndex--;
        } else {
          currentFocus = 'grid';
        }
      } else if (key === 'ArrowDown') {
        e.preventDefault();
        if (sidebarIndex >= 0 && sidebarIndex < keys.length - 1) {
          sidebarIndex++;
        } else {
          sidebarIndex = -1;
        }
      } else if (key === 'Enter') {
        e.preventDefault();
        if (sidebarIndex === -1) submitRequest();
        else if (sidebarIndex >= 0) {
          const id = keys[sidebarIndex];
          updateQty(id, sidebarType === 'plus' ? 1 : -1);
        }
      }
    }
    
    updateFocus();
});

load();
</script>
</body>
</html>
