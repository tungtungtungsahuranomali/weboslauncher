<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Info</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #000;
  overflow: hidden;
  height: 100vh; width: 100vw;
  display: flex;
  align-items: center;
  justify-content: center;
}
#player {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}
#player video {
  width: 100%;
  height: 100%;
}
#countdown {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  color: rgba(255,255,255,0.5);
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 0.85rem;
  font-family: monospace;
  z-index: 10;
}
.overlay {
  position: fixed; inset: 0;
  display: flex;
  align-items: center; justify-content: center;
  background: #000;
  z-index: 5;
}
.overlay.hidden { display: none; }
.spinner {
  width: 40px; height: 40px;
  border: 4px solid #333;
  border-top: 4px solid #facc15;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading" class="overlay"><div class="spinner"></div></div>
<div id="player"></div>
<div id="countdown"></div>

<script>
let items = [];
let currentIdx = 0;
let timer = null;

async function loadPlaylist() {
  try {
    const res = await fetch(`./api.php?action=getInfoPlaylist&_=${Date.now()}`);
    const d = await res.json();
    if (d.status === 'success' && d.data.length) {
      items = d.data;
      document.getElementById('loading').classList.add('hidden');
      showItem(0);
    }
  } catch(e) {}
}

function showItem(idx) {
  if (idx >= items.length) idx = 0;
  if (idx < 0) idx = items.length - 1;
  currentIdx = idx;
  clearTimeout(timer);

  const item = items[idx];
  const container = document.getElementById('player');
  container.innerHTML = '';
  document.getElementById('countdown').textContent = '';

  if (item.type === 'image') {
    const img = document.createElement('img');
    img.src = item.url;
    img.style.cssText = 'width:100vw;height:100vh;object-fit:contain;background:#000;';
    container.appendChild(img);
    const dur = Math.max((item.duration || 10) * 1000, 3000);
    startCountdown(dur / 1000);
    timer = setTimeout(() => showItem(idx + 1), dur);
  } else if (item.type === 'video') {
    const video = document.createElement('video');
    video.src = item.url;
    video.autoplay = true;
    video.playsinline = true;
    video.muted = false;
    video.style.cssText = 'width:100vw;height:100vh;object-fit:contain;background:#000;';
    video.onended = () => showItem(idx + 1);
    video.onerror = () => showItem(idx + 1);
    container.appendChild(video);
    video.play().catch(() => showItem(idx + 1));
  }
}

function startCountdown(sec) {
  document.getElementById('countdown').textContent = sec + 's';
  const interval = setInterval(() => {
    sec--;
    if (sec <= 0) { clearInterval(interval); return; }
    document.getElementById('countdown').textContent = sec + 's';
  }, 1000);
  // Store interval to clear on manual nav
  window._cdInterval = interval;
}

// Remote navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (window._cdInterval) clearInterval(window._cdInterval);
    showItem(currentIdx - 1);
  } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    if (window._cdInterval) clearInterval(window._cdInterval);
    showItem(currentIdx + 1);
  } else if (e.key === 'Backspace' || e.key === 'Escape') {
    e.preventDefault();
    clearTimeout(timer);
    location.href = 'index.php';
  } else if (e.key === 'Enter') {
    e.preventDefault();
    showItem(currentIdx + 1);
  }
});

loadPlaylist();
</script>
</body>
</html>
