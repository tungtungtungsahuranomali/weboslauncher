<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TakeOff Launcher</title>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', 'Segoe UI', sans-serif; background: #111; color: #fff; }
    #setup {
      position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
      background: #0f0f0f; padding: 40px; z-index: 200;
    }
    #setup.active { display: flex; }
    #setup h2 { font-size: 24px; color: #facc15; margin-bottom: 12px; }
    #setup p { font-size: 14px; color: #aaa; margin-bottom: 24px; text-align: center; max-width: 500px; line-height: 1.6; }
    #setup input {
      width: 100%; max-width: 500px; padding: 14px 18px;
      background: #1a1a2e; border: 2px solid #333; border-radius: 8px;
      color: #fff; font-size: 18px; text-align: center; outline: none;
    }
    #setup input:focus { border-color: #facc15; }
    #setup .btn {
      margin-top: 20px; padding: 12px 40px; background: #facc15; color: #000;
      border: none; border-radius: 8px; font-size: 16px; font-weight: 700;
      cursor: pointer; opacity: 0.9;
    }
    #setup .btn:focus, #setup .btn:hover { opacity: 1; outline: 2px solid #fff; }
  </style>
</head>
<body>
<div id="setup" class="active">
  <h2>Server Configuration</h2>
  <p>Enter the URL of the TakeOff server to connect to.</p>
  <input type="text" id="serverUrlInput" placeholder="http://192.168.1.100:8080" onkeydown="if(event.key==='Enter')saveUrl()">
  <button class="btn" onclick="saveUrl()">Connect</button>
</div>

<script>
var STORAGE_SERVER_KEY = 'webos_server_url';
var SERVER_URL = '';

function getServerUrl() {
  var url = localStorage.getItem(STORAGE_SERVER_KEY);
  if (url) return url;
  if (window.APP_CONFIG && APP_CONFIG.defaultServerUrl) return APP_CONFIG.defaultServerUrl;
  return '';
}

function saveUrl() {
  var input = document.getElementById('serverUrlInput');
  var url = input.value.trim();
  if (!url) { input.focus(); return; }
  if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'http://' + url;
  localStorage.setItem(STORAGE_SERVER_KEY, url);
  window.location.href = url.replace(/\/+$/, '') + '/index.php';
}

function showSetup() {
  document.getElementById('setup').classList.add('active');
  document.getElementById('serverUrlInput').value = getServerUrl();
  setTimeout(function() { document.getElementById('serverUrlInput').focus(); }, 300);
}

// === Boot ===
var savedUrl = getServerUrl();
if (savedUrl) {
  window.location.href = savedUrl.replace(/\/+$/, '') + '/index.php';
} else {
  showSetup();
}
</script>
</body>
</html>
