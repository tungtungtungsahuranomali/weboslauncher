<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TakeOff Launcher</title>
<script src="config.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0f0f; color: #fff; font-family: 'Inter', 'Segoe UI', sans-serif; }
#splash {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #0f0f0f 100%);
  z-index: 100;
  transition: opacity 0.5s ease;
}
#splash img { width: 100px; height: 100px; margin-bottom: 24px; }
#splash h1 { font-size: 28px; font-weight: 700; letter-spacing: 2px; color: #facc15; margin-bottom: 8px; }
#splash p { font-size: 14px; color: #888; }
.spinner { width: 32px; height: 32px; margin-top: 32px; border: 3px solid #333; border-top-color: #facc15; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#setup {
  position: fixed; inset: 0;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  background: #0f0f0f; padding: 40px; z-index: 200;
}
#setup.active { display: flex; }
#setup h2 { font-size: 24px; color: #facc15; margin-bottom: 12px; }
#setup p { font-size: 14px; color: #aaa; margin-bottom: 24px; text-align: center; max-width: 500px; line-height: 1.6; }
#setup input {
  width: 100%; max-width: 500px; padding: 14px 18px;
  background: #1a1a2e; border: 2px solid #333; border-radius: 8px;
  color: #fff; font-size: 18px; text-align: center; outline: none;
}
#setup input:focus { border-color: #facc15; }
#setup .btn {
  margin-top: 20px; padding: 12px 40px; background: #facc15; color: #000;
  border: none; border-radius: 8px; font-size: 16px; font-weight: 700;
  cursor: pointer; opacity: 0.9;
}
#setup .btn:focus, #setup .btn:hover { opacity: 1; outline: 2px solid #fff; }
#error {
  position: fixed; inset: 0;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  background: #0f0f0f; padding: 40px; z-index: 200;
}
#error.active { display: flex; }
#error .icon { font-size: 48px; margin-bottom: 16px; }
#error h2 { font-size: 22px; color: #ef4444; margin-bottom: 8px; }
#error p { font-size: 14px; color: #aaa; margin-bottom: 24px; text-align: center; max-width: 500px; }
#error .btn {
  padding: 12px 40px; background: #facc15; color: #000;
  border: none; border-radius: 8px; font-size: 16px; font-weight: 700;
  cursor: pointer; margin: 6px;
}
#error .btn:focus { outline: 2px solid #fff; }
#error .btn.secondary { background: #333; color: #fff; }
</style>
</head>
<body>

<div id="splash">
  <img src="icon.png" alt="TakeOff">
  <h1>TakeOff</h1>
  <p>Loading...</p>
  <div class="spinner"></div>
</div>

<div id="setup">
  <h2>Server Configuration</h2>
  <p>Enter the URL of the TakeOff server to connect to.<br>Contact hotel staff if you don't know this address.</p>
  <input type="text" id="serverUrlInput" placeholder="http://192.168.1.100:8080" onkeydown="if(event.key==='Enter')saveUrl()">
  <button class="btn" id="saveBtn" onclick="saveUrl()">Connect</button>
</div>

<div id="error">
  <div class="icon">⚠</div>
  <h2>Connection Failed</h2>
  <p id="errorMsg">Unable to reach the server. Make sure the server is running and accessible from this TV.</p>
  <div>
    <button class="btn" onclick="retryConnect()">Retry</button>
    <button class="btn secondary" onclick="showSetup()">Configure</button>
  </div>
</div>

<script>
var RESET_COUNT = 0;
var RESET_TIMER = null;
var CONNECT_TIMEOUT = 15000;

function getServerUrl() {
  var url = localStorage.getItem('serverUrl');
  if (url) return url;

  if (window.APP_CONFIG && APP_CONFIG.defaultServerUrl) {
    return APP_CONFIG.defaultServerUrl;
  }
  return '';
}

function saveUrl() {
  var input = document.getElementById('serverUrlInput');
  var url = input.value.trim();
  if (!url) {
    input.focus();
    return;
  }
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    url = 'http://' + url;
  }
  localStorage.setItem('serverUrl', url);
  connectToServer(url);
}

function showSetup() {
  document.getElementById('error').classList.remove('active');
  document.getElementById('setup').classList.add('active');
  document.getElementById('serverUrlInput').value = getServerUrl();
  setTimeout(function() { document.getElementById('serverUrlInput').focus(); }, 300);
}

function retryConnect() {
  document.getElementById('error').classList.remove('active');
  document.getElementById('splash').style.opacity = '1';
  startConnection();
}

function connectToServer(url) {
  document.getElementById('splash').style.opacity = '1';
  document.getElementById('setup').classList.remove('active');
  document.getElementById('error').classList.remove('active');

  var timeout = setTimeout(function() {
    document.getElementById('splash').style.opacity = '0';
    document.getElementById('errorMsg').textContent =
      'Connection timed out. Unable to reach ' + url +
      '. Make sure the server is running and accessible from this TV.';
    document.getElementById('error').classList.add('active');
  }, CONNECT_TIMEOUT);

  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = CONNECT_TIMEOUT;
  xhr.onload = function() {
    clearTimeout(timeout);
    if (xhr.status >= 200 && xhr.status < 400) {
      window.location.href = url;
    } else {
      document.getElementById('splash').style.opacity = '0';
      document.getElementById('errorMsg').textContent =
        'Server returned status ' + xhr.status + '. Check the URL and try again.';
      document.getElementById('error').classList.add('active');
    }
  };
  xhr.onerror = function() {
    clearTimeout(timeout);
    document.getElementById('splash').style.opacity = '0';
    document.getElementById('errorMsg').textContent =
      'Cannot reach ' + url + '. Check the connection and try again.';
    document.getElementById('error').classList.add('active');
  };
  xhr.send();
}

function startConnection() {
  var url = getServerUrl();
  if (url) {
    connectToServer(url);
  } else {
    showSetup();
  }
}

function registerEim() {
  if (!window.webOS || !webOS.service) {
    return;
  }
  webOS.service.request('luna://com.webos.service.eim', {
    method: 'addDevice',
    parameters: {
      appId: 'com.takeoff.launcher',
      pigImage: 'icon.png',
      mvpdIcon: '',
      type: 'MVPD_IP',
      showPopup: false,
      label: 'TakeOff',
      description: 'TakeOff Hotel Launcher'
    },
    onSuccess: function() {
      localStorage.setItem('eim_registered', '1');
    },
    onFailure: function(err) {
      console.log('EIM registration failed:', err);
    }
  });
}

function checkLaunchParams() {
  var params = null;
  try {
    if (window.webOS && webOS.launchParams) {
      params = webOS.launchParams();
    }
    if (params && params.serverUrl) {
      localStorage.setItem('serverUrl', params.serverUrl);
    }
  } catch(e) {}
}

function handleKeyDown(e) {
  var key = e.key || e.keyCode;

  if (key === '0' || key === 48) {
    RESET_COUNT++;
    clearTimeout(RESET_TIMER);
    RESET_TIMER = setTimeout(function() { RESET_COUNT = 0; }, 3000);
    if (RESET_COUNT >= 5) {
      RESET_COUNT = 0;
      localStorage.removeItem('serverUrl');
      localStorage.removeItem('eim_registered');
      showSetup();
    }
    return;
  }

  if (key === 'Info' || key === 457) {
    RESET_COUNT++;
    clearTimeout(RESET_TIMER);
    RESET_TIMER = setTimeout(function() { RESET_COUNT = 0; }, 3000);
    if (RESET_COUNT >= 3) {
      RESET_COUNT = 0;
      localStorage.removeItem('serverUrl');
      localStorage.removeItem('eim_registered');
      showSetup();
    }
  }
}

document.addEventListener('keydown', handleKeyDown);

checkLaunchParams();

if (!localStorage.getItem('eim_registered')) {
  if (document.readyState === 'complete') {
    registerEim();
  } else {
    window.addEventListener('load', registerEim);
  }
}

if (document.readyState === 'complete') {
  startConnection();
} else {
  window.addEventListener('load', startConnection);
}
</script>
</body>
</html>
