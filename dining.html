<script>
const lang = localStorage.getItem('app_lang') || 'id';

const dict = {
  'id': { 
      'dining_title': 'Kategori Menu', 
      'cart': 'Keranjang', 
      'total': 'Total', 
      'order_btn': 'Pesan Sekarang', 
      'close': 'Sembunyikan', 
      'success': 'Pesanan Berhasil Dikirim!', 
      'empty': 'Keranjang Kosong' 
  },
  'en': { 
      'dining_title': 'Menu Categories', 
      'cart': 'Your Cart', 
      'total': 'Total', 
      'order_btn': 'Order Now', 
      'close': 'Hide Cart', 
      'success': 'Order Sent Successfully!', 
      'empty': 'Cart is Empty' 
  }
};

document.querySelectorAll('[data-translate]').forEach(el => {
  const k = el.dataset.translate;
  if(dict[lang] && dict[lang][k]) el.textContent = dict[lang][k];
});

let categories = [];
let allMenus = [];
let filteredMenus = [];
let cart = {};
let cartEnabled = true;

// UI State
let currentCatIndex = 0;
let currentMenuIndex = 0;
let currentSlideIndex = 0;
let slides = []; // Used for slideshow when cart disabled
// focus areas: 'menu', 'category_btn', 'cart', 'info_cat', 'info_slide'
let currentFocus = 'menu';

// Auto-play state for slideshow
let autoTimer = null;
const AUTO_INTERVAL = 5000;
let isPaused = false;

// Cart UI State
let cartFocusIndex = -1; // -1 for order btn, >= 0 for items
let cartFocusType = 'item'; // 'minus', 'plus', 'btnOrder'

// Remote vs Mouse Control
let isMouseActive = false;
let lastMouseMove = 0;
document.addEventListener('mousemove', () => { 
    const now = Date.now();
    if (now - lastMouseMove > 100) { // Hanya aktif jika ada pergerakan nyata (bukan jitter)
        isMouseActive = true; 
    }
    lastMouseMove = now;
});
document.addEventListener('keydown', () => { 
    isMouseActive = false; 
});

async function init() {
  try {
    const catRes = await fetch(`./api.php?action=getKatDining&_=${Date.now()}`);
    const catData = await catRes.json();
    if (catData.status === 'success') categories = catData.data;

    const facRes = await fetch(`./api.php?action=getDining&lang=${lang}&_=${Date.now()}`);
    const facData = await facRes.json();
    if (facData.status === 'success') {
      allMenus = facData.data;
      cartEnabled = facData.cart_enabled;
    }

    if (categories.length === 0 && allMenus.length === 0) {
      const target = cartEnabled ? 'menuPanel' : 'slideshow';
      document.getElementById(target).innerHTML = '<div class="no-data"><span>📭</span>No Menu Available</div>';
      return;
    }

    // Handle menus without category or empty categories
    // Checks for null, undefined, '', or loosely 0 using ==
    const hasUncategorized = allMenus.some(m => !m.id_kat_dining || m.id_kat_dining == 0);
    if (categories.length === 0 || hasUncategorized) {
      categories.unshift({
        id_kat_dining: 'all',
        nm_kat_dining: dict[lang] && dict[lang]['all_menu'] ? dict[lang]['all_menu'] : (lang === 'en' ? 'All Menu' : 'Semua Menu'),
        foto_kat_dining: ''
      });
    }

    if (cartEnabled) {
      document.getElementById('cartLayoutMain').style.display = 'flex';
      document.getElementById('cartSidebar').classList.remove('hidden');
      document.getElementById('infoLayout').classList.remove('active');
      document.getElementById('navHintCart').style.display = 'flex';
      document.getElementById('navHintInfo').style.display = 'none';
      const hint = document.querySelector('.nav-hint');
      hint.style.left = '30px';
      hint.style.right = 'auto';
      currentFocus = 'menu';
    } else {
      document.getElementById('cartLayoutMain').style.display = 'none';
      document.getElementById('cartSidebar').classList.add('hidden');
      document.getElementById('infoLayout').classList.add('active');
      document.getElementById('navHintCart').style.display = 'none';
      document.getElementById('navHintInfo').style.display = 'flex';
      const hint = document.querySelector('.nav-hint');
      hint.style.left = 'auto';
      hint.style.right = '30px';
      currentFocus = 'info_cat';
      buildInfoCategoryList();
    }

    selectCategory(0);
    if (cartEnabled) renderCart();

  } catch(e) {
    console.error(e);
    const target = cartEnabled ? 'menuPanel' : 'slideshow';
    document.getElementById(target).innerHTML = '<div class="no-data"><span>⚠️</span>Failed to load data</div>';
  }
}

function buildInfoCategoryList() {
  const container = document.getElementById('catList');
  container.innerHTML = '';
  categories.forEach((cat, i) => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (i === 0 ? ' active focused' : '');
    el.id = `info-cat-${i}`;

    const thumbHTML = cat.foto_kat_dining
      ? `<img src="${cat.foto_kat_dining}" class="cat-thumb" alt="">`
      : `<div class="cat-thumb-placeholder">🍽️</div>`;

    const count = (cat.id_kat_dining === 'all') 
      ? allMenus.length 
      : allMenus.filter(f => f.id_kat_dining == cat.id_kat_dining).length;

    el.innerHTML = `${thumbHTML}<span class="cat-name">${cat.nm_kat_dining}</span><span class="cat-count">${count}</span>`;
    container.appendChild(el);
  });
}

function toggleCategoryFocus() {
  if (!cartEnabled) return;
  if (currentFocus === 'category_btn') {
    currentFocus = 'menu';
  } else {
    currentFocus = 'category_btn';
  }
  updateGlobalFocus();
}

function selectCategory(index) {
  if (!categories[index]) return;
  
  currentCatIndex = index;
  currentMenuIndex = 0;
  currentSlideIndex = 0;
  
  const cat = categories[index];
  document.getElementById('currentCatName').textContent = cat.nm_kat_dining;

  const catId = cat.id_kat_dining;
  if (catId === 'all') {
    filteredMenus = allMenus;
  } else {
    filteredMenus = allMenus.filter(f => f.id_kat_dining == catId);
  }
  slides = filteredMenus; // Slideshow uses filtered menus too

  if (cartEnabled) {
    buildMenuGrid();
  } else {
    // Update category active state in side panel
    document.querySelectorAll('.cat-item').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });
    buildSlides();
    startAuto();
  }
  updateGlobalFocus();
}

function buildMenuGrid() {
  const container = document.getElementById('menuGrid');
  container.innerHTML = '';

  if (filteredMenus.length === 0) {
    container.innerHTML = '<div class="no-data">Belum ada menu di kategori ini</div>';
    return;
  }

  filteredMenus.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'menu-card';
    card.id = `menu-card-${i}`;
    
    card.onmouseenter = () => {
      if (!isMouseActive) return;
      currentFocus = 'menu';
      currentMenuIndex = i;
      updateGlobalFocus();
    };
    card.onclick = (e) => {
      e.preventDefault();
      addToCart(m);
    };

    const price = m.price ? parseInt(m.price).toLocaleString() : '0';

    card.innerHTML = `
      <div class="menu-card-hint">OK +</div>
      <img src="${m.icon_path}" class="menu-card-img" onerror="this.src='img/menu/ayam.png'">
      <div class="menu-card-body">
        <div class="menu-card-name">${m.name}</div>
        <div class="menu-card-price">Rp ${price}</div>
      </div>
    `;
    container.appendChild(card);
  });
}

function buildSlides() {
  const container = document.getElementById('slideshow');
  container.innerHTML = '';

  if (slides.length === 0) {
    container.innerHTML = '<div class="no-data">Belum ada menu di kategori ini</div>';
    return;
  }

  slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');

    div.innerHTML = `
      <img src="${s.icon_path}" alt="">
      <div class="slide-caption">
        <div class="slide-caption-left">
          <h2>${s.name}</h2>
          <div class="price">Rp ${parseInt(s.price).toLocaleString()}</div>
        </div>
      </div>
    `;
    container.appendChild(div);
  });

  updateCounter();
  buildDots();
}

function updateCounter() {
  const counter = document.getElementById('slideCounter');
  if (!cartEnabled && slides.length > 0) {
    counter.textContent = `${currentSlideIndex + 1} / ${slides.length}`;
  } else {
    counter.textContent = '';
  }
}

function buildDots() {
  const container = document.getElementById('slideIndicators');
  container.innerHTML = '';
  if (!cartEnabled) {
    slides.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'slide-dot' + (i === 0 ? ' active' : '');
      container.appendChild(dot);
    });
  }
}

function goToSlide(index) {
  if (slides.length === 0) return;
  const allSlides = document.querySelectorAll('.slide');
  const allDots = document.querySelectorAll('.slide-dot');

  allSlides[currentSlideIndex]?.classList.remove('active');
  allDots[currentSlideIndex]?.classList.remove('active');

  currentSlideIndex = ((index % slides.length) + slides.length) % slides.length;

  allSlides[currentSlideIndex]?.classList.add('active');
  allDots[currentSlideIndex]?.classList.add('active');
  updateCounter();
}

function nextSlide() { goToSlide(currentSlideIndex + 1); }
function prevSlide() { goToSlide(currentSlideIndex - 1); }

function startAuto() {
  stopAuto();
  if (cartEnabled) return;
  isPaused = false;
  updateSlideFocusIndicator();
  if (slides.length > 1) {
    autoTimer = setInterval(nextSlide, AUTO_INTERVAL);
  }
}

function stopAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
}

function togglePause() {
  if (isPaused) {
    startAuto();
  } else {
    stopAuto();
    isPaused = true;
    updateSlideFocusIndicator();
  }
}

function updateSlideFocusIndicator() {
  const el = document.getElementById('slideFocusIndicator');
  if (isPaused) {
    el.textContent = '⏸ Paused';
  } else {
    el.textContent = '▶ Auto-play';
  }
}

function addToCart(item) {
  if (!cart[item.id]) cart[item.id] = { ...item, qty: 0 };
  cart[item.id].qty++;
  renderCart();

  // Pindahkan fokus ke item yang baru saja ditambahkan di keranjang
  const keys = Object.keys(cart);
  const itemIndexInCart = keys.indexOf(String(item.id));
  if (itemIndexInCart !== -1) {
    currentFocus = 'cart';
    cartFocusIndex = itemIndexInCart;
    cartFocusType = 'plus';
    updateGlobalFocus();
  }
}

function renderCart() {
  const c = document.getElementById('cartList');
  c.innerHTML = '';
  let total = 0;
  
  const keys = Object.keys(cart);
  keys.forEach((k, idx) => {
    const i = cart[k];
    total += i.price * i.qty;
    
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.id = `cart-el-${idx}`;
    
    div.innerHTML = `
      <div class="cart-item-name">${i.name}</div>
      <div class="cart-item-price">Rp ${i.price.toLocaleString()}</div>
      <div class="cart-controls">
        <div class="qty-btn btn-minus" id="cart-btn-${idx}-minus">-</div>
        <div class="font-bold w-6 text-center">${i.qty}</div>
        <div class="qty-btn btn-plus" id="cart-btn-${idx}-plus">+</div>
      </div>
    `;
    c.appendChild(div);

    setTimeout(() => {
        const btnMinus = document.getElementById(`cart-btn-${idx}-minus`);
        const btnPlus = document.getElementById(`cart-btn-${idx}-plus`);
        if (btnMinus) {
            btnMinus.onmouseenter = () => { if (!isMouseActive) return; currentFocus = 'cart'; cartFocusIndex = idx; cartFocusType = 'minus'; updateGlobalFocus(); };
            btnMinus.onclick = (e) => {
                e.preventDefault();
                i.qty--;
                if (i.qty <= 0) {
                    delete cart[k];
                    if (Object.keys(cart).length === 0) currentFocus = 'menu';
                }
                renderCart();
                updateGlobalFocus();
            };
        }
        if (btnPlus) {
            btnPlus.onmouseenter = () => { if (!isMouseActive) return; currentFocus = 'cart'; cartFocusIndex = idx; cartFocusType = 'plus'; updateGlobalFocus(); };
            btnPlus.onclick = (e) => {
                e.preventDefault();
                i.qty++;
                renderCart();
                updateGlobalFocus();
            };
        }
        div.onmouseenter = () => { if (!isMouseActive) return; currentFocus = 'cart'; cartFocusIndex = idx; updateGlobalFocus(); };
    }, 0);
  });
  
  document.getElementById('cartTotal').textContent = 'Rp ' + total.toLocaleString();
  document.getElementById('cartItemCount').textContent = `${keys.length} Items`;
}

function updateGlobalFocus() {
  // Clear all focuses
  document.querySelectorAll('.menu-card, .cart-sidebar, .nav-btn-cat, .cat-item, .cart-item, .qty-btn, .cart-btn').forEach(el => el.classList.remove('focused'));
  const indicator = document.getElementById('focusIndicator');

  if (currentFocus === 'category_btn') {
    const btnCat = document.getElementById('btnCategory');
    if (btnCat) btnCat.classList.add('focused');
    if (indicator) {
      indicator.textContent = 'KATEGORI';
      indicator.style.background = 'rgba(250,204,21,0.2)';
      indicator.style.color = '#facc15';
      indicator.style.borderColor = '#facc15';
    }
  } 
  else if (currentFocus === 'menu') {
    const el = document.getElementById(`menu-card-${currentMenuIndex}`);
    if (el) {
        el.classList.add('focused');
        el.scrollIntoView({behavior: 'smooth', block: 'center'});
    }
    if (indicator) {
      indicator.textContent = 'MENU';
      indicator.style.background = 'rgba(59,130,246,0.2)';
      indicator.style.color = '#3b82f6';
      indicator.style.borderColor = '#3b82f6';
    }
  } 
  else if (currentFocus === 'cart') {
    const sidebar = document.getElementById('cartSidebar');
    if (sidebar) sidebar.classList.add('focused');
    if (indicator) {
      indicator.textContent = 'KERANJANG';
      indicator.style.background = 'rgba(16,185,129,0.2)';
      indicator.style.color = '#10b981';
      indicator.style.borderColor = '#10b981';
    }
    updateCartFocus();
  }
  else if (currentFocus === 'info_cat') {
    const el = document.getElementById(`info-cat-${currentCatIndex}`);
    if (el) {
      el.classList.add('focused');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    if (indicator) {
      indicator.textContent = 'KATEGORI';
      indicator.style.background = 'rgba(250,204,21,0.2)';
      indicator.style.color = '#facc15';
      indicator.style.borderColor = '#facc15';
    }
  }
  else if (currentFocus === 'info_slide') {
    if (indicator) {
      indicator.textContent = 'SLIDE';
      indicator.style.background = 'rgba(59,130,246,0.2)';
      indicator.style.color = '#3b82f6';
      indicator.style.borderColor = '#3b82f6';
    }
  }
}

function updateCartFocus() {
  // Sudah dihapus di updateGlobalFocus, tapi untuk keamanan kita hapus lagi khusus cart elements
  document.querySelectorAll('.cart-item, .qty-btn, .cart-btn').forEach(el => el.classList.remove('focused'));
  if (currentFocus !== 'cart') return;

  const keys = Object.keys(cart);
  const numItems = keys.length;

  const bOrder = document.getElementById('btnOrder');
  if (cartFocusIndex === -1) {
    if (bOrder) bOrder.classList.add('focused');
  } else if (cartFocusIndex >= 0 && cartFocusIndex < numItems) {
    const itemEl = document.getElementById(`cart-el-${cartFocusIndex}`);
    if (itemEl) itemEl.classList.add('focused');
    const btnEl = document.getElementById(`cart-btn-${cartFocusIndex}-${cartFocusType}`);
    if (btnEl) btnEl.classList.add('focused');
  }
}

const btnOrder = document.getElementById('btnOrder');
if (btnOrder) {
    btnOrder.onclick = (e) => {
        e.preventDefault();
        submitOrder();
    };
    btnOrder.onmouseenter = () => { 
        if (!isMouseActive) return;
        currentFocus = 'cart'; 
        cartFocusIndex = -1; 
        updateGlobalFocus(); 
    };
}

let isModalOpen = false;

function showModal(title, msg, isSuccess=true) {
  const m = document.getElementById('msgModal');
  if (!m) return;
  const mTitle = document.getElementById('modalTitle');
  const mText = document.getElementById('modalText');
  const mIcon = document.getElementById('modalIcon');
  const mBtn = document.getElementById('modalBtn');

  if (mTitle) mTitle.textContent = title;
  if (mText) mText.textContent = msg;
  if (mIcon) mIcon.textContent = isSuccess ? '✅' : '❌';
  
  m.classList.add('show');
  isModalOpen = true;
  if (mBtn) mBtn.classList.add('focused');
}

function hideModal() {
  const m = document.getElementById('msgModal');
  if (m) m.classList.remove('show');
  isModalOpen = false;
  currentFocus = 'menu';
  updateGlobalFocus();
}

const modalBtn = document.getElementById('modalBtn');
if (modalBtn) {
    modalBtn.onclick = () => hideModal();
}

async function submitOrder() {
  if(Object.keys(cart).length === 0) return showModal("Error", dict[lang]['empty'], false);
  try {
    const res = await fetch('./api.php?action=submitDiningOrder', {
      method:'POST', 
      body:JSON.stringify({
          guest_name: localStorage.getItem('guest_name_v8_final')||'Guest', 
          room_number: localStorage.getItem('room_number_v8_final')||'-', 
          items: Object.values(cart)
      })
    });
    const d = await res.json();
    if(d.status === 'success') {
      cart = {}; 
      renderCart();
      showModal(lang === 'id' ? 'Berhasil' : 'Success', dict[lang]['success'], true);
    } else {
      showModal("Error", d.message || "Failed to place order", false);
    }
  } catch(e) { 
    console.error(e); 
    showModal("System Error", e.message, false);
  }
}

document.addEventListener('keydown', (e) => {
  if (isModalOpen) {
    if (e.key === 'Enter' || e.key === 'Escape') {
      e.preventDefault();
      hideModal();
    }
    return;
  }

  const key = e.key;
  
  if (key === 'Backspace' || key === 'Escape') {
      e.preventDefault();
      if (cartEnabled) {
        if (currentFocus === 'cart' || currentFocus === 'category_btn') {
            currentFocus = 'menu';
            updateGlobalFocus();
        } else {
            location.href = 'index.php';
        }
      } else {
        if (currentFocus === 'info_slide') {
          currentFocus = 'info_cat';
          updateGlobalFocus();
        } else {
          location.href = 'index.php';
        }
      }
      return;
  }

  if (cartEnabled) {
    if (currentFocus === 'category_btn') {
        if (key === 'ArrowRight') {
            e.preventDefault();
            selectCategory((currentCatIndex + 1) % categories.length);
        } else if (key === 'ArrowLeft') {
            e.preventDefault();
            selectCategory((currentCatIndex - 1 + categories.length) % categories.length);
        } else if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'Enter') {
            e.preventDefault();
            currentFocus = 'menu';
            updateGlobalFocus();
        }
    } 
    else if (currentFocus === 'menu') {
        const cols = Math.floor(document.getElementById('menuGrid').offsetWidth / 180) || 1;
        if (key === 'ArrowRight') {
            e.preventDefault();
            if (currentMenuIndex < filteredMenus.length - 1) {
                currentMenuIndex++;
            } else if (Object.keys(cart).length > 0) {
                currentFocus = 'cart';
                cartFocusIndex = 0;
                cartFocusType = 'plus';
            }
        } else if (key === 'ArrowLeft') {
            e.preventDefault();
            if (currentMenuIndex > 0) {
              currentMenuIndex--;
            } else {
              currentFocus = 'category_btn';
            }
        } else if (key === 'ArrowDown') {
            e.preventDefault();
            if (currentMenuIndex + cols < filteredMenus.length) {
                currentMenuIndex += cols;
            } else {
                if (Object.keys(cart).length > 0) {
                    currentFocus = 'cart';
                    cartFocusIndex = 0;
                    cartFocusType = 'plus';
                } else {
                    currentFocus = 'cart';
                    cartFocusIndex = -1;
                }
            }
        } else if (key === 'ArrowUp') {
            e.preventDefault();
            if (currentMenuIndex - cols >= 0) {
                currentMenuIndex -= cols;
            } else {
                currentFocus = 'category_btn';
            }
        } else if (key === 'Enter') {
            e.preventDefault();
            if (filteredMenus[currentMenuIndex]) addToCart(filteredMenus[currentMenuIndex]);
        }
        updateGlobalFocus();
    } 
    else if (currentFocus === 'cart') {
        const keys = Object.keys(cart);
        if (key === 'ArrowLeft') {
            e.preventDefault();
            if (cartFocusIndex >= 0 && cartFocusType === 'plus') {
                cartFocusType = 'minus';
            } else {
                currentFocus = 'menu';
            }
        } else if (key === 'ArrowRight') {
            e.preventDefault();
            if (cartFocusIndex >= 0 && cartFocusType === 'minus') {
              cartFocusType = 'plus';
            }
        } else if (key === 'ArrowDown') {
            e.preventDefault();
            if (cartFocusIndex < keys.length - 1) cartFocusIndex++;
            else if (cartFocusIndex === keys.length - 1) cartFocusIndex = -1;
        } else if (key === 'ArrowUp') {
            e.preventDefault();
            if (cartFocusIndex === -1) cartFocusIndex = keys.length - 1;
            else if (cartFocusIndex > 0) cartFocusIndex--;
            else if (cartFocusIndex === 0) {
                currentFocus = 'category_btn';
            }
        } else if (key === 'Enter') {
            e.preventDefault();
            if (cartFocusIndex === -1) submitOrder();
            else if (cartFocusIndex >= 0) {
                const k = keys[cartFocusIndex];
                if (cartFocusType === 'plus') {
                    cart[k].qty++;
                } else {
                    cart[k].qty--;
                    if (cart[k].qty <= 0) {
                        delete cart[k];
                        if (Object.keys(cart).length === 0) currentFocus = 'menu';
                    }
                }
                renderCart();
            }
        }
        updateGlobalFocus();
    }
  } else {
    // Info Layout Navigation
    if (currentFocus === 'info_cat') {
      if (key === 'ArrowDown') {
        e.preventDefault();
        if (currentCatIndex < categories.length - 1) {
          selectCategory(currentCatIndex + 1);
          updateGlobalFocus();
        }
      } else if (key === 'ArrowUp') {
        e.preventDefault();
        if (currentCatIndex > 0) {
          selectCategory(currentCatIndex - 1);
          updateGlobalFocus();
        }
      } else if (key === 'ArrowRight' || key === 'Enter') {
        e.preventDefault();
        currentFocus = 'info_slide';
        updateGlobalFocus();
      }
    } else if (currentFocus === 'info_slide') {
      if (key === 'ArrowRight') { e.preventDefault(); nextSlide(); stopAuto(); isPaused = true; updateSlideFocusIndicator(); }
      if (key === 'ArrowLeft') { e.preventDefault(); prevSlide(); stopAuto(); isPaused = true; updateSlideFocusIndicator(); }
      if (key === 'ArrowUp') { e.preventDefault(); currentFocus = 'info_cat'; updateGlobalFocus(); }
      if (key === 'Enter') { e.preventDefault(); togglePause(); }
    }
  }
});

init();
</script>
</body>
</html>
