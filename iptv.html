<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IPTV Player</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #111;
  color: white;
  overflow: hidden;
  height: 100vh; width: 100vw;
}
.player-container {
  display: flex;
  height: 100vh;
  background: #000;
}
.video-area {
  flex: 1;
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.video-area video {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.channel-list {
  width: 320px;
  background: rgba(20,20,20,0.95);
  overflow-y: auto;
  border-left: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}
.channel-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: background 0.15s;
}
.channel-item.active {
  background: rgba(250,204,21,0.2);
  border-left: 3px solid #facc15;
}
.channel-item:focus {
  background: rgba(250,204,21,0.15);
  outline: none;
}
.channel-logo {
  width: 40px;
  height: 40px;
  object-fit: contain;
  flex-shrink: 0;
  border-radius: 4px;
}
.channel-info {
  flex: 1;
  min-width: 0;
}
.channel-name {
  font-size: 0.9rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.channel-category {
  font-size: 0.7rem;
  color: #9ca3af;
}
.channel-number {
  width: 28px;
  height: 28px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  flex-shrink: 0;
}
.overlay-msg {
  position: absolute;
  color: rgba(255,255,255,0.5);
  font-size: 1.2rem;
  pointer-events: none;
}
.no-video { opacity: 0.3; }
@media(max-width:768px) {
  .channel-list { width: 200px; }
}
</style>
</head>
<body>
<div class="player-container">
  <div class="video-area" id="videoArea">
    <video id="videoPlayer" autoplay muted playsinline></video>
    <div class="overlay-msg" id="overlayMsg">Pilih channel untuk mulai menonton</div>
  </div>
  <div class="channel-list" id="channelList">
    <div class="p-3 text-center text-yellow-400 font-bold text-sm border-b border-white/10">📺 Channels</div>
    <div id="channelItems"></div>
  </div>
</div>

<script>
const video = document.getElementById('videoPlayer');
const overlayMsg = document.getElementById('overlayMsg');
const channelItems = document.getElementById('channelItems');
let channels = [];
let currentIndex = 0;
let hls = null;

async function loadChannels() {
  try {
    const res = await fetch(`./api.php?action=get_channels&_=${Date.now()}`);
    const data = await res.json();
    channels = data.manual || [];
    renderChannels();
  } catch(e) {
    channelItems.innerHTML = '<div class="p-4 text-center text-red-400">Gagal memuat channel</div>';
  }
}

function renderChannels() {
  channelItems.innerHTML = '';
  channels.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'channel-item' + (i === currentIndex ? ' active' : '');
    div.tabIndex = 0;
    div.dataset.index = i;
    div.innerHTML = `
      <span class="channel-number">${i + 1}</span>
      <img class="channel-logo" src="${ch.logo || ''}" alt="" onerror="this.style.display='none'">
      <div class="channel-info">
        <div class="channel-name">${ch.name}</div>
        <div class="channel-category">${ch.category || ''}</div>
      </div>`;
    div.onclick = () => selectChannel(i);
    channelItems.appendChild(div);
  });
  scrollToCurrent();
}

function selectChannel(index) {
  currentIndex = index;
  document.querySelectorAll('.channel-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });
  playChannel(channels[index]);
  scrollToCurrent();
}

function playChannel(ch) {
  if (hls) { hls.destroy(); hls = null; }
  if (!ch || !ch.url) return;

  overlayMsg.classList.add('hidden');
  video.classList.remove('no-video');

  if (ch.url.includes('.m3u8')) {
    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(ch.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.muted = false;
        video.play().catch(() => {});
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = ch.url;
      video.play().catch(() => {});
    }
  } else {
    video.src = ch.url;
    video.play().catch(() => {});
  }
}

function scrollToCurrent() {
  const el = document.querySelector('.channel-item.active');
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// Keyboard / Remote navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (currentIndex > 0) selectChannel(currentIndex - 1);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (currentIndex < channels.length - 1) selectChannel(currentIndex + 1);
  } else if (e.key === 'Backspace' || e.key === 'Escape') {
    e.preventDefault();
    if (hls) hls.destroy();
    location.href = 'index.php';
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const el = document.querySelector('.channel-item.active');
    if (el) el.focus();
  }
});

loadChannels();
</script>
</body>
</html>
